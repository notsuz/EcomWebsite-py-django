{% for i in data %}

<div class="col-sm-6 col-xl-4">
    <div class="product-card">
        <div class="product-image-area">
            <span class="product-badge new">New</span>
            <div class="product-actions">
                <button class="action-btn"><i class="fas fa-heart"></i></button>
                <a href="{% url 'product_detail' i.id  %}"><button class="action-btn"><i
                            class="fas fa-eye"></i></button></a>
                <button class="action-btn"><i class="fas fa-share-alt"></i></button>
            </div>
            <img src="{{i.image.url}}" alt="Lenovo Legion">
        </div>
        <div class="product-body">
            <div class="brand-tag">{{i.name}}</div>
            <p class="product-title">{{i.desc | safe | truncatewords_html:5}}</p>
        </div>
        <div class="product-footer">
            <div class="product-price">Rs. {{i.price}} <span class="original">Rs.{{i.mark_price}}</span></div>
            <a href="{% url 'cart_add' i.id %}"><button class="btn-add-cart"><i class="fas fa-bag-shopping"></i>
                    Add</button></a>
        </div>
    </div>
</div>
{% empty %}
<p class="text-center alert alert-info">No products found currently</p>
{% endfor %}
